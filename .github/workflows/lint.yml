name: Lint

on:
  push:
    paths:
      - '**.sh'
      - 'shells/.bashrc'
      - 'shells/.zshrc'
      - '**.ps1'
      - '**.toml'
      - '**.yaml'
      - '**.yml'
  pull_request:
    paths:
      - '**.sh'
      - 'shells/.bashrc'
      - 'shells/.zshrc'
      - '**.ps1'
      - '**.toml'
      - '**.yaml'
      - '**.yml'

jobs:
  lint-shell:
    name: ShellCheck (Bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: Run shell checks
        run: |
          find . -type f -name '*.sh' -exec shellcheck {} +
          shellcheck --shell=bash --exclude=SC1091 shells/.bashrc
          bash -n shells/.bashrc
          zsh -n shells/.zshrc

  lint-powershell:
    name: PowerShell (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - name: Checkout only workflows and PowerShell installer
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            .github/workflows
            install.ps1
            install-windows.ps1
            config/kanata/add_to_startup_windows.ps1
          sparse-checkout-cone-mode: false

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PowerShell Analysis
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.ps1
          $results = @(
          foreach ($file in $files) {
            Invoke-ScriptAnalyzer -Path $file.FullName -Recurse -Severity Warning,Error
          }
          )
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            exit 1
          }

  lint-toml:
    name: Taplo (TOML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker://docker.io/tamasfe/taplo:latest
        with:
          args: lint --no-auto-config .
