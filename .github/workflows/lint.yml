name: Lint

on:
  workflow_dispatch:
  push:
    paths:
      - '**.sh'
      - 'shells/.bashrc'
      - 'shells/.zshrc'
      - '**.ps1'
      - '**.toml'
      - '**.yaml'
      - '**.yml'
  pull_request:
    paths:
      - '**.sh'
      - 'shells/.bashrc'
      - 'shells/.zshrc'
      - '**.ps1'
      - '**.toml'
      - '**.yaml'
      - '**.yml'

permissions:
  contents: read

jobs:
  lint-workflows:
    name: actionlint (GitHub Actions)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash

      - name: Run actionlint
        run: ./actionlint

  lint-shell:
    name: ShellCheck (Bash)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: Run shell checks
        run: |
          find . -type f -name '*.sh' -exec shellcheck {} +
          shellcheck --shell=bash --exclude=SC1091 shells/.bashrc
          bash -n shells/.bashrc
          zsh -n shells/.zshrc

  lint-powershell:
    name: PowerShell (PSScriptAnalyzer)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PowerShell scripts
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            *.ps1
          sparse-checkout-cone-mode: false

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery

      - name: Run PowerShell Analysis
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Recurse -File -Filter *.ps1
          $results = @(
          foreach ($file in $files) {
            Invoke-ScriptAnalyzer -Path $file.FullName -Severity Warning,Error
          }
          )
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize
            exit 1
          }

  lint-toml:
    name: Taplo (TOML)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Validate TOML files
        uses: docker://docker.io/tamasfe/taplo:latest
        with:
          args: lint --no-auto-config **/*.toml

      - name: Validate Yazi theme schema
        uses: docker://docker.io/tamasfe/taplo:latest
        with:
          args: lint --no-auto-config --schema https://yazi-rs.github.io/schemas/theme.json config/yazi/theme.toml config/yazi/flavors/**/*.toml
