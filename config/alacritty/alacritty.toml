[window]
decorations = "None"
padding = { x = 10, y = 20 }
dynamic_padding = true

[font]
size = 12

[font.normal]
family = "MesloLGS NF"
style = "Regular"

[font.bold]
family = "MesloLGS NF"
style = "Bold"

[font.italic]
family = "MesloLGS NF"
style = "Italic"

[font.bold_italic]
family = "MesloLGS NF"
style = "Bold Italic"

[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]

[keyboard]
bindings = [
  # Alacritty on Windows does not reliably emit Ctrl-/ to WSL.
  # Send Ctrl-_ (0x1f), which Neovim maps as the terminal toggle.
  { key = "/", mods = "Control", chars = "\u001F" },
  { key = "/", mods = "Control|Shift", chars = "\u001F" },
  { key = "7", mods = "Control", chars = "\u001F" },
  { key = "7", mods = "Control|Shift", chars = "\u001F" },
]
