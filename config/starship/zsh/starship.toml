[custom.giturl]
description = "Display symbol for remote Git server"
format = "at $output  "
command = """
#!/usr/bin/env sh
url="$(git ls-remote --get-url 2>/dev/null || printf '')"
case "$url" in
  *github*)    printf '’Éł' ;;
  *gitlab*)    printf '’Ŗ¢' ;;
  *bitbucket*) printf '’ģ▒' ;;
  *codeberg*)  printf '’ćÆ' ;;
  *git*)       printf '’ćÆ' ;;
  *)           printf '’ćÆ' ;;
esac
"""
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
