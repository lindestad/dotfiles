$font = Inter
$bg = rgba(111111ff)
$surface = rgba(111111d9)
$surface_variant = rgba(191919cc)
$primary = rgba(f2f2f2ff)
$secondary = rgba(e6e6e6ee)
$muted = rgba(5d5d5dff)
$outline = rgba(3c3c3ccc)
$shadow = rgba(00000099)
$error = rgba(fd4663ff)

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
    fractional_scaling = 2
    fail_timeout = 1500
}

auth {
    pam {
        module = password-auth
    }

    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}

animations {
    enabled = false
}

background {
    monitor =
    path = screenshot
    color = $bg
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.92
    brightness = 0.66
    vibrancy = 0.12
    vibrancy_darkness = 0.05
}

shape {
    monitor =
    size = 480, 178
    color = $surface
    rounding = 10
    border_size = 1
    border_color = $outline
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
    shadow_boost = 1.2
    position = 0, -76
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    text_align = center
    color = $primary
    font_size = 96
    font_family = $font
    shadow_passes = 2
    shadow_size = 6
    shadow_color = $shadow
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date '+%A, %d %B'
    text_align = center
    color = $secondary
    font_size = 16
    font_family = $font
    position = 0, 82
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    text_align = center
    color = $secondary
    font_size = 14
    font_family = $font
    position = 0, 38
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 380, 48
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.24
    dots_center = true
    outer_color = $outline
    inner_color = $surface_variant
    font_color = $primary
    font_family = $font
    fade_on_empty = false
    placeholder_text = <i>Password or fingerprint</i>
    rounding = 8
    check_color = $primary
    check_text = Authenticating
    fail_color = $error
    fail_text = <i>$FAIL</i>
    capslock_color = $secondary
    position = 0, -58
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTPROMPT
    text_align = center
    color = $secondary
    font_size = 13
    font_family = $font
    position = 0, -106
    halign = center
    valign = center
}

label {
    monitor =
    text = $FPRINTFAIL
    text_align = center
    color = $error
    font_size = 13
    font_family = $font
    position = 0, -132
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[!]
    color = $muted
    font_size = 13
    font_family = $font
    position = 32, 28
    halign = left
    valign = bottom
}

label {
    monitor =
    text = niri / noctalia
    color = $muted
    font_size = 13
    font_family = $font
    position = -32, 28
    halign = right
    valign = bottom
}
